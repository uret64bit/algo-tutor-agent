services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: algo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-algo_tutor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algo_tutor_secret}
      POSTGRES_DB: ${POSTGRES_DB:-algo_tutor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algo_tutor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: algo-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: algo-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock   # 后端 spawn 兄弟沙箱容器
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: algo-frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # 沙箱镜像构建服务：仅构建，不常驻
  # 使用 `docker compose --profile build up sandbox-build` 一次构建
  sandbox-build:
    build: ./backend/sandbox
    image: algo-sandbox:latest
    profiles: ["build"]
    command: ["echo", "sandbox image built"]

volumes:
  pgdata:
  redisdata:
